

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="title text-center fw-bold fs-1 fs-md-.display-3">BMI CALCULATOR<i class="bi bi-heart-pulse-fill text-success ms-2"></i></h1>
    <p class="subtitle text-center fs-6 fs-md-4 px-3 opacity-50">Calculate your body mass index and check your health status</p>
    <div class="container">
        <div class="row mt-5 justify-content-md-center gap-4">
        
            <!-- INPUT -->

            <div class=" col-md-5">
                <div class="card p-5 shadow w-100 h-100" style="min-height: 450px;">
                <h4><i class="bi bi-person-fill fs-3 text-success me-3"></i>ENTER YOUR DETAILS</h4>
                    <hr class="text-success">
         
                <p class="ps-2 mb-1"> Height (cm)</p>
                  <input  class="form-control"  type="number" id="height" placeholder="Enter your height in cm">
                
                    <p class="ps-2 pt-4 mb-1">Weight (kg)</p>
                 <input class="form-control" type="number" id="weight" placeholder="Enter your weight in kg">
                

                    <button type="button" class="btn btn-success mt-4" id="calculate">CALCULATE BMI</button>
                    <button type="button" class="btn btn-outline-success mt-3" id="reset"><i class="bi bi-arrow-repeat me-1"></i>RESET</button>
             </div>
            </div>

            <!-- RESULT -->
            <div class=" col-md-5 ">
                <div class="card p-5 shadow w-100 h-100" style="min-height: 450px;">
                    <h4 class="fs-4 fw-semibold mb-4">
                        <i class="bi bi-bar-chart-fill text-success me-2"></i>YOUR RESULT</h4>

                    <div class="bg-success-subtle rounded-4 p-4 text-center" id="resultbox">
                    <p class="text-muted fs-5 mb-2">Your BMI</p>
                        <h1 class="display-1 fw-bold text-success" id="bmiresult">0.0</h1>
                        <span class="badge bg-success rounded-pill px-4 py-2 fs-6 mt-2" id="status">NORMAL</span>
                        <p class="text-muted mt-3 mb-0" id="message">Enter your details to calculate BMI</p>
                    </div>
    </div>
    </div>
    </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="index.js"></script>

</body>
</html>
